services:
  mongo:
    image: mongo:7
    container_name: volunteerhub-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: volunteerhub-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/volunteerhub
      - DNS_SERVERS=
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    container_name: volunteerhub-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      - PORT=3300
      - API_BASE_URL=http://localhost:5000
    depends_on:
      - backend
    ports:
      - "3300:3300"

volumes:
  mongo_data:
